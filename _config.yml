title: Bússola Financeira
description: "Manual do usuário e documentação oficial do Bússola Financeira — gestão financeira para Organizações da Sociedade Civil, pela RIT."
lang: pt-BR
url: https://docs.bf.rit.org.br
permalink: pretty

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

defaults:
  - scope:
      path: ""
    values:
      layout: default

# Tema / cor
color_scheme: bussola
logo: "/assets/logo.png"

# Busca
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true

# Callouts (admonitions)
callouts:
  note:
    title: Nota
    color: blue
  tip:
    title: Dica
    color: green
  warning:
    title: Atenção
    color: yellow
  important:
    title: Importante
    color: red
  example:
    title: Exemplo
    color: purple

# Links auxiliares (canto superior direito)
aux_links:
  "Acessar o Bússola":
    - "https://bf.rit.org.br"
aux_links_new_tab: true

# Rodapé
footer_content: '© 2026 <a href="https://rit.org.br" target="_blank" rel="noopener">RIT — Rede de Inovação e Transformação</a>. Todos os direitos reservados. · <a href="/termos/">Termos de Uso</a> · <a href="/privacidade/">Privacidade</a>'
last_edit_timestamp: false
back_to_top: true
back_to_top_text: "Voltar ao topo"

# Excluir do build
exclude:
  - "*.sh"
  - README.md
