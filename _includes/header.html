<header class="site-header" role="banner">
  <div class="wrapper">
    <div style="display:flex; align-items:center; gap:1.25rem; padding:0.5rem 0;">
      <a href="https://rit.org.br" target="_blank" rel="noopener noreferrer">
        <img src="https://assets.rit.org.br/logo/rit-logo-composta.svg"
             alt="RIT — Rede de Inovação e Transformação"
             style="height:44px; width:auto; display:block;">
      </a>
      <span style="color:#ddd; font-size:1.4rem; line-height:1; font-weight:200;">|</span>
      <a class="site-title" rel="author" href="{{ '/' | relative_url }}" style="display:flex; align-items:center;">
        <img src="https://assets.rit.org.br/logo/logo-bussola-completa.png"
             alt="{{ site.title | escape }}"
             style="height:36px; width:auto; display:block;">
      </a>
    </div>
    <nav class="docs-tabs" aria-label="Seções" style="border-top:1px solid #e8e8e8; margin-top:0.25rem; padding-top:0.5rem; display:flex; gap:0.25rem; flex-wrap:wrap;">
      {% for tab in site.data.topnav %}
        {% assign is_active = false %}
        {% if tab.prefix %}
          {% if page.url contains tab.prefix %}
            {% assign is_active = true %}
          {% endif %}
        {% else %}
          {% if page.url == tab.url %}
            {% assign is_active = true %}
          {% endif %}
        {% endif %}
        <a href="{{ tab.url | relative_url }}"
           style="padding:0.35rem 0.85rem; border-radius:4px; font-size:0.9rem; text-decoration:none; color:{% if is_active %}#155799{% else %}#555{% endif %}; background:{% if is_active %}#e8f0f8{% else %}transparent{% endif %}; font-weight:{% if is_active %}600{% else %}normal{% endif %};">
          {{ tab.title }}
        </a>
      {% endfor %}
    </nav>
  </div>
</header>
